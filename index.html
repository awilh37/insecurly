<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insecurly - Web Proxy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1400px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .sidebar {
            width: 300px;
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .browser-container {
            flex: 1;
            min-width: 600px;
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: #f0f0f0;
            border-radius: 8px;
            font-size: 14px;
            color: #666;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ccc;
            transition: background 0.3s;
        }

        .status-dot.connected {
            background: #4caf50;
        }

        .status-dot.disconnected {
            background: #f44336;
        }

        .input-group {
            display: flex;
            gap: 8px;
            flex-direction: column;
        }

        label {
            font-size: 14px;
            color: #666;
            font-weight: 500;
        }

        input[type="text"],
        input[type="password"] {
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 10px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #5568d3;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        button.secondary {
            background: #f0f0f0;
            color: #333;
        }

        button.secondary:hover {
            background: #e0e0e0;
        }

        .toolbar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .toolbar button {
            flex: 1;
            min-width: 80px;
            padding: 8px 12px;
            font-size: 13px;
        }

        .url-bar {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .url-bar input {
            flex: 1;
        }

        .url-bar button {
            padding: 8px 12px;
            min-width: auto;
        }

        #viewport {
            width: 100%;
            height: 600px;
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
        }

        #viewport-wrapper {
            position: relative;
            display: inline-block;
        }

        #viewport img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: block;
            user-select: none;
        }

        #viewport-cursor {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid #667eea;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            display: none;
            box-shadow: 0 0 0 1px rgba(102, 126, 234, 0.5);
        }

        #viewport-cursor::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 4px;
            background: #667eea;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        .viewport-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
            display: none;
        }

        .viewport-overlay.active {
            display: block;
        }

        .error-message {
            padding: 12px;
            background: #ffebee;
            color: #c62828;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            padding: 12px;
            background: #e8f5e9;
            color: #2e7d32;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #f0f0f0;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .section-title {
            font-size: 12px;
            font-weight: 600;
            color: #999;
            text-transform: uppercase;
            margin-top: 10px;
            margin-bottom: 10px;
        }

        /* Console Panel Styles */
        #console-panel {
            position: fixed;
            bottom: 0;
            right: 0;
            width: 400px;
            height: 300px;
            background: #1e1e1e;
            color: #d4d4d4;
            border: 1px solid #444;
            border-radius: 8px 8px 0 0;
            display: none;
            flex-direction: column;
            z-index: 10000;
            box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.3);
            font-family: 'Courier New', monospace;
            font-size: 12px;
            margin: 10px;
        }

        #console-panel.show {
            display: flex;
        }

        #console-header {
            background: #2d2d2d;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #444;
            font-weight: 600;
            cursor: move;
        }

        #console-close {
            background: none;
            border: none;
            color: #d4d4d4;
            cursor: pointer;
            font-size: 18px;
            padding: 0;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #console-close:hover {
            background: #444;
        }

        #console-output {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            word-break: break-all;
            white-space: pre-wrap;
            font-size: 11px;
            line-height: 1.4;
        }

        .console-log {
            color: #d4d4d4;
        }

        .console-info {
            color: #4fc3f7;
        }

        .console-warn {
            color: #ffc107;
        }

        .console-error {
            color: #f44336;
        }

        .console-line {
            margin-bottom: 4px;
        }

        #console-input-container {
            background: #2d2d2d;
            padding: 8px;
            border-top: 1px solid #444;
            display: flex;
            gap: 5px;
        }

        #console-input {
            flex: 1;
            background: #3e3e3e;
            color: #d4d4d4;
            border: 1px solid #555;
            border-radius: 4px;
            padding: 5px 8px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
        }

        #console-input:focus {
            outline: none;
            border-color: #667eea;
        }

        #console-clear {
            background: #555;
            color: #d4d4d4;
            border: 1px solid #777;
            border-radius: 4px;
            padding: 5px 12px;
            cursor: pointer;
            font-size: 11px;
        }

        #console-clear:hover {
            background: #666;
        }

        @media (max-width: 1024px) {
            #console-panel {
                width: 100%;
                height: 200px;
            }

            .container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
            }

            .browser-container {
                min-width: auto;
            }

            #viewport {
                height: 400px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div>
                <h1>Insecurly</h1>
                <div class="status-indicator">
                    <div class="status-dot disconnected" id="statusDot"></div>
                    <span id="statusText">Disconnected</span>
                </div>
            </div>

            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>

            <div class="input-group" id="authSection">
                <label>Register / Connect</label>
                <button id="connectBtn" onclick="connectToServer()">Connect to Server</button>
            </div>

            <div class="input-group" style="display: none;" id="launchSection">
                <div class="section-title">Launch Browser</div>
                <label>Enter Website URL</label>
                <div style="display: flex; gap: 8px;">
                    <input type="text" id="urlInput" placeholder="google.com" value="google.com">
                    <button onclick="launchBrowser()" style="min-width: auto; padding: 10px 16px;">Go</button>
                </div>
            </div>

            <div class="input-group" style="display: none;" id="interactionSection">
                <div class="section-title">Interaction</div>
                <label>Click Coordinates</label>
                <div style="display: flex; gap: 8px;">
                    <input type="text" id="clickX" placeholder="X" style="width: 50%;">
                    <input type="text" id="clickY" placeholder="Y" style="width: 50%;">
                    <button onclick="clickPage()" style="min-width: auto;">Click</button>
                </div>

                <label>Type Text</label>
                <div style="display: flex; gap: 8px;">
                    <input type="text" id="typeInput" placeholder="Text to type" style="flex: 1;">
                    <button onclick="typePage()" style="min-width: auto;">Type</button>
                </div>

                <label>Scroll (X, Y)</label>
                <div style="display: flex; gap: 8px;">
                    <input type="text" id="scrollX" placeholder="X" style="width: 50%;">
                    <input type="text" id="scrollY" placeholder="Y" style="width: 50%;">
                    <button onclick="scrollPage()" style="min-width: auto;">Scroll</button>
                </div>
            </div>

            <div style="display: none;" id="browserSection">
                <div class="section-title">Browser Controls</div>
                <div class="toolbar">
                    <button class="secondary" onclick="goBack()" title="Back">← Back</button>
                    <button class="secondary" onclick="goForward()" title="Forward">Forward →</button>
                    <button class="secondary" onclick="refreshPage()" title="Refresh">⟳ Refresh</button>
                </div>
                <button onclick="closeBrowser()" style="width: 100%; margin-top: 10px;">Close Browser</button>
            </div>
        </div>

        <div class="browser-container">
            <div class="url-bar">
                <input type="text" id="addressBar" placeholder="https://example.com" disabled>
                <button onclick="navigateTo()" style="min-width: auto; padding: 8px 12px;">Navigate</button>
            </div>

            <div class="toolbar">
                <button class="secondary" onclick="requestScreenshot()" style="flex: 1;">📸 Screenshot</button>
            </div>

            <div id="viewport">
                <div id="viewport-wrapper" style="position: relative; display: inline-block;">
                    <span style="color: #ccc; font-size: 18px;">Browser viewport will appear here</span>
                </div>
                <div id="viewport-cursor"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script>
        const SERVER_URL = (() => {
            const hostname = window.location.hostname;
            console.log(`[INIT] Current hostname: ${hostname}`);
            
            if (hostname === 'localhost' || hostname === '127.0.0.1') {
                console.log(`[INIT] Using localhost server at http://localhost:3002`);
                return 'http://localhost:3002';
            } else if (hostname === 'awilh37.github.io') {
                console.log(`[INIT] Using production server at https://rand0m.tplinkdns.com`);
                return 'https://rand0m.tplinkdns.com';
            } else {
                console.log(`[INIT] Using fallback server at http://${hostname}:3002`);
                return `http://${hostname}:3002`;
            }
        })();

        console.log(`[INIT] SERVER_URL set to: ${SERVER_URL}`);

        let socket = null;
        let isConnected = false;
        let browserActive = false;
        let token = null;

        function updateStatus(connected) {
            isConnected = connected;
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            
            if (connected) {
                dot.classList.remove('disconnected');
                dot.classList.add('connected');
                text.textContent = 'Connected';
            } else {
                dot.classList.remove('connected');
                dot.classList.add('disconnected');
                text.textContent = 'Disconnected';
            }
        }

        function showError(message) {
            console.error(`[ERROR] ${message}`);
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
            setTimeout(() => errorDiv.classList.remove('show'), 5000);
        }

        function showSuccess(message) {
            console.log(`[SUCCESS] ${message}`);
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.classList.add('show');
            setTimeout(() => successDiv.classList.remove('show'), 3000);
        }

        function connectToServer() {
            console.log(`[SOCKET] Attempting to connect to ${SERVER_URL}`);
            
            socket = io(SERVER_URL, {
                reconnection: true,
                reconnectionDelay: 1000,
                reconnectionDelayMax: 5000,
                reconnectionAttempts: 5,
                transports: ['websocket', 'polling']
            });

            socket.on('connect', () => {
                console.log(`[SOCKET] Successfully connected. Socket ID: ${socket.id}`);
                showSuccess('Connected to server!');
                
                // Request authentication from server
                console.log('[AUTH] Requesting authentication token...');
                fetch(`${SERVER_URL}/auth/register`, { 
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                })
                    .then(res => {
                        console.log(`[AUTH] Auth response status: ${res.status}`);
                        return res.json();
                    })
                    .then(data => {
                        console.log(`[AUTH] Received token: ${data.token.substring(0, 10)}...`);
                        token = data.token;
                        socket.emit('authenticate', { token });
                    })
                    .catch(err => {
                        console.error(`[AUTH ERROR] Failed to get token:`, err);
                        showError('Failed to authenticate with server: ' + err.message);
                    });
            });

            socket.on('authenticated', () => {
                console.log('[SOCKET] Authenticated successfully');
                updateStatus(true);
                showSuccess('Authenticated! Ready to launch browser');
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('launchSection').style.display = 'flex';
            });

            socket.on('browser-launched', (data) => {
                console.log(`[BROWSER] Browser launched: ${data.url}`);
                showSuccess(`Browser launched: ${data.url}`);
                browserActive = true;
                startScreenshotRefresh();
                document.getElementById('interactionSection').style.display = 'flex';
                document.getElementById('browserSection').style.display = 'block';
                document.getElementById('addressBar').value = data.url;
            });

            socket.on('screenshot', (data) => {
                console.log('[BROWSER] Screenshot received');
                const viewport = document.getElementById('viewport');
                const wrapper = document.getElementById('viewport-wrapper');
                
                // Create or update image
                let img = wrapper.querySelector('img');
                if (!img) {
                    img = document.createElement('img');
                    img.style.display = 'block';
                    img.style.userSelect = 'none';
                    wrapper.innerHTML = '';
                    wrapper.appendChild(img);
                }
                img.src = `data:image/png;base64,${data.image}`;
                
                // Attach click handler to image
                img.onclick = (e) => handleViewportClick(e, img);
            });

            socket.on('error', (data) => {
                console.error('[SOCKET ERROR]', data);
                showError(`Server error: ${data.message}`);
            });

            socket.on('connect_error', (error) => {
                console.error('[CONNECTION ERROR]', error);
                showError(`Connection error: ${error.message}`);
            });

            socket.on('disconnect', () => {
                console.log('[SOCKET] Disconnected from server');
                updateStatus(false);
                browserActive = false;
                stopScreenshotRefresh();
                document.getElementById('authSection').style.display = 'flex';
                document.getElementById('launchSection').style.display = 'none';
                document.getElementById('interactionSection').style.display = 'none';
                document.getElementById('browserSection').style.display = 'none';
            });
        }

        function launchBrowser() {
            if (!isConnected) {
                showError('Not connected to server');
                return;
            }

            const url = document.getElementById('urlInput').value;
            if (!url) {
                showError('Please enter a URL');
                return;
            }

            socket.emit('launch-browser', { url });
        }

        function navigateTo() {
            if (!browserActive) {
                showError('No active browser');
                return;
            }

            const url = document.getElementById('addressBar').value;
            if (!url) {
                showError('Please enter a URL');
                return;
            }

            socket.emit('navigate', { url });
        }

        function clickPage() {
            if (!browserActive) {
                showError('No active browser');
                return;
            }

            const x = parseInt(document.getElementById('clickX').value);
            const y = parseInt(document.getElementById('clickY').value);

            if (isNaN(x) || isNaN(y)) {
                showError('Please enter valid coordinates');
                return;
            }

            socket.emit('click', { x, y });
        }

        function typePage() {
            if (!browserActive) {
                showError('No active browser');
                return;
            }

            const text = document.getElementById('typeInput').value;
            if (!text) {
                showError('Please enter text to type');
                return;
            }

            socket.emit('type', { text });
            document.getElementById('typeInput').value = '';
        }

        function scrollPage() {
            if (!browserActive) {
                showError('No active browser');
                return;
            }

            const x = parseInt(document.getElementById('scrollX').value) || 0;
            const y = parseInt(document.getElementById('scrollY').value) || 0;

            socket.emit('scroll', { x, y });
        }

        function goBack() {
            if (!browserActive) {
                showError('No active browser');
                return;
            }

            socket.emit('back');
        }

        function goForward() {
            if (!browserActive) {
                showError('No active browser');
                return;
            }

            socket.emit('forward');
        }

        function refreshPage() {
            if (!browserActive) {
                showError('No active browser');
                return;
            }

            requestScreenshot();
        }

        function requestScreenshot() {
            if (!browserActive) {
                showError('No active browser');
                return;
            }

            socket.emit('screenshot');
        }

        function closeBrowser() {
            if (!browserActive) {
                showError('No active browser');
                return;
            }

            socket.emit('close-browser');
            browserActive = false;
            stopScreenshotRefresh();
            document.getElementById('interactionSection').style.display = 'none';
            document.getElementById('browserSection').style.display = 'none';
            document.getElementById('viewport').innerHTML = '<div id="viewport-wrapper"><span style="color: #ccc; font-size: 18px;">Browser closed</span></div>';
            showSuccess('Browser closed');
        }

        // Viewport click handler - convert click to browser coordinates
        function handleViewportClick(event, imgElement) {
            if (!browserActive) {
                showError('No active browser');
                return;
            }

            // Get image dimensions and position
            const rect = imgElement.getBoundingClientRect();
            const imgWidth = imgElement.naturalWidth || imgElement.width;
            const imgHeight = imgElement.naturalHeight || imgElement.height;
            
            // Calculate click position relative to browser viewport
            const x = Math.round(((event.clientX - rect.left) / rect.width) * imgWidth);
            const y = Math.round(((event.clientY - rect.top) / rect.height) * imgHeight);
            
            console.log(`[CLICK] User clicked at (${x}, ${y})`);
            
            // Send click to server
            if (socket && socket.connected) {
                socket.emit('click', { x, y });
            }
        }

        // Track mouse position and show cursor
        document.addEventListener('mousemove', (event) => {
            if (!browserActive) return;
            
            const viewport = document.getElementById('viewport');
            const img = viewport.querySelector('img');
            
            if (!img) return;
            
            const rect = img.getBoundingClientRect();
            
            // Check if mouse is over the image
            if (event.clientX >= rect.left && event.clientX <= rect.right &&
                event.clientY >= rect.top && event.clientY <= rect.bottom) {
                
                const cursor = document.getElementById('viewport-cursor');
                cursor.style.display = 'block';
                cursor.style.left = (event.clientX - rect.left - 10) + 'px';
                cursor.style.top = (event.clientY - rect.top - 10) + 'px';
            } else {
                document.getElementById('viewport-cursor').style.display = 'none';
            }
        });

        // Auto-refresh screenshot every 500ms when browser is active
        let screenshotInterval = null;
        
        function startScreenshotRefresh() {
            if (screenshotInterval) clearInterval(screenshotInterval);
            screenshotInterval = setInterval(() => {
                if (browserActive && socket && socket.connected) {
                    socket.emit('screenshot');
                }
            }, 500);
            console.log('[AUTO-REFRESH] Screenshot refresh started (500ms)');
        }

        function stopScreenshotRefresh() {
            if (screenshotInterval) {
                clearInterval(screenshotInterval);
                screenshotInterval = null;
                console.log('[AUTO-REFRESH] Screenshot refresh stopped');
            }
        }

        // Update browser activation to control refresh
        const originalBrowserActive = browserActive;
        Object.defineProperty(window, 'browserActiveState', {
            get() {
                return browserActive;
            },
            set(value) {
                browserActive = value;
                if (value) {
                    startScreenshotRefresh();
                } else {
                    stopScreenshotRefresh();
                }
            }
        });

        // Initialize
        console.log('[PAGE] Insecurly frontend loaded');
        console.log(`[PAGE] Server URL will be: ${SERVER_URL}`);
        updateStatus(false);
    </script>

    <!-- Console Panel -->
    <div id="console-panel">
        <div id="console-header">
            <span>Console (Press ` to toggle)</span>
            <button id="console-close" onclick="toggleConsole()">×</button>
        </div>
        <div id="console-output"></div>
        <div id="console-input-container">
            <input type="text" id="console-input" placeholder="eval() in browser console (readonly here)" disabled>
            <button id="console-clear" onclick="clearConsole()">Clear</button>
        </div>
    </div>

    <script>
        // Console interception
        const consoleOutput = document.getElementById('console-output');
        const consolePanel = document.getElementById('console-panel');
        const maxLines = 1000;
        let lineCount = 0;

        // Store original console methods
        const originalLog = console.log;
        const originalError = console.error;
        const originalWarn = console.warn;
        const originalInfo = console.info;

        function addConsoleLine(message, type = 'log') {
            if (lineCount >= maxLines) {
                consoleOutput.removeChild(consoleOutput.firstChild);
            } else {
                lineCount++;
            }

            const line = document.createElement('div');
            line.className = `console-line console-${type}`;
            line.textContent = message;
            consoleOutput.appendChild(line);
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
        }

        function formatArgs(args) {
            return args.map(arg => {
                if (typeof arg === 'object') {
                    try {
                        return JSON.stringify(arg, null, 2);
                    } catch (e) {
                        return String(arg);
                    }
                }
                return String(arg);
            }).join(' ');
        }

        console.log = function(...args) {
            originalLog.apply(console, args);
            addConsoleLine(`[LOG] ${formatArgs(args)}`, 'log');
        };

        console.error = function(...args) {
            originalError.apply(console, args);
            addConsoleLine(`[ERROR] ${formatArgs(args)}`, 'error');
        };

        console.warn = function(...args) {
            originalWarn.apply(console, args);
            addConsoleLine(`[WARN] ${formatArgs(args)}`, 'warn');
        };

        console.info = function(...args) {
            originalInfo.apply(console, args);
            addConsoleLine(`[INFO] ${formatArgs(args)}`, 'info');
        };

        // Catch uncaught errors
        window.addEventListener('error', (event) => {
            addConsoleLine(`[UNCAUGHT ERROR] ${event.message} at ${event.filename}:${event.lineno}:${event.colno}`, 'error');
        });

        // Catch unhandled promise rejections
        window.addEventListener('unhandledrejection', (event) => {
            addConsoleLine(`[UNHANDLED REJECTION] ${event.reason}`, 'error');
        });

        function toggleConsole() {
            consolePanel.classList.toggle('show');
            if (consolePanel.classList.contains('show')) {
                document.getElementById('console-input').focus();
            }
        }

        function clearConsole() {
            consoleOutput.innerHTML = '';
            lineCount = 0;
        }

        // Hotkey handler (backtick)
        document.addEventListener('keydown', (event) => {
            if (event.key === '`' && !event.ctrlKey && !event.metaKey && !event.altKey) {
                event.preventDefault();
                toggleConsole();
            }
        });

        // Initial message
        addConsoleLine('Insecurly Console - Press ` to toggle, or click × to close', 'info');
    </script>
</body>
</html>
